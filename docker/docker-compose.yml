name: canvashub

services:
  sidecar:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    image: canvashub:latest
    container_name: canvashub-sidecar
    ports:
      - "18080:18080"
    environment:
      - CHATGPT_POOL_HOST=0.0.0.0
      - CHATGPT_POOL_AUTH_KEY=${CHATGPT_POOL_AUTH_KEY:-sk-docker-default-key}
    volumes:
      - canvashub_data:/app/data
    command: >
      uvicorn sidecars.chatgpt_pool.app:app
      --host 0.0.0.0 --port 18080
    restart: unless-stopped

  server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    image: canvashub:latest
    container_name: canvashub-server
    ports:
      - "18463:18463"
    environment:
      - CHATGPT_POOL_AUTH_KEY=${CHATGPT_POOL_AUTH_KEY:-sk-docker-default-key}
      - MINIAPP_ACCESS_PASSWORD=${MINIAPP_ACCESS_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - COMFY_BASE_URL=${COMFY_BASE_URL:-}
      - THIRD_PARTY_IMAGE_API_KEY=${THIRD_PARTY_IMAGE_API_KEY:-}
      - THIRD_PARTY_IMAGE_API_BASE_URL=${THIRD_PARTY_IMAGE_API_BASE_URL:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - NANO_BANANA_API_KEY=${NANO_BANANA_API_KEY:-}
    volumes:
      - canvashub_data:/app/data
    command: ["python", "server.py"]
    depends_on:
      - sidecar
    restart: unless-stopped

volumes:
  canvashub_data:
